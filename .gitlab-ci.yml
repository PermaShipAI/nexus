image: node:20

stages:
  - lint
  - test
  - eval

cache:
  paths:
    - node_modules/

before_script:
  - npm ci

lint:
  stage: lint
  script:
    - npm run format:check
    - npm run lint
    - npm run typecheck

test:
  stage: test
  script:
    - npx vitest run --reporter=default --reporter=junit --outputFile=junit.xml
  artifacts:
    when: always
    reports:
      junit: junit.xml

test:coverage:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files\s*\|\s*([\d\.]+)/'

agent-eval:
  stage: eval
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true
  script:
    - npx tsx scripts/run-agent-evals.ts

intent-eval:
  stage: eval
  rules:
    - if: '$GEMINI_API_KEY'
  allow_failure: false
  script:
    - npm run test:eval:intent
